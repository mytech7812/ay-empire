<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | AY Empire</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <!-- Admin Nav -->
  <nav class="admin-nav">
    <a href="dashboard.html" class="admin-nav-brand">AY Empire <span>Admin</span></a>
    <ul class="admin-nav-links">
      <li><a href="dashboard.html" class="active">Dashboard</a></li>
      <li><a href="orders.html">Orders</a></li>
      <li><a href="products.html">Products</a></li>
        <li><a href="sales.html">Sales</a></li>
      <li><a href="#" id="logout-btn">Logout</a></li>
    </ul>
  </nav>

  <!-- Dashboard Content -->
  <main class="admin-main">
    <div class="admin-header">
      <h1>Dashboard</h1>
      <p>Welcome back, Admin! Here's what's happening.</p>
    </div>

    <!-- Stats Cards -->
    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
        </div>
        <div class="stat-info">
          <h3 id="total-orders">0</h3>
          <p>Total Orders</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="stat-info">
          <h3 id="pending-orders">0</h3>
          <p>Pending Orders</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <div class="stat-info">
          <h3 id="paid-orders">0</h3>
          <p>Paid Orders</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 7h-4.5A2.5 2.5 0 0013 9.5v5a2.5 2.5 0 002.5 2.5H20"/>
            <path d="M4 7h4.5A2.5 2.5 0 0111 9.5v5a2.5 2.5 0 01-2.5 2.5H4"/>
            <rect x="2" y="5" width="20" height="14" rx="2"/>
          </svg>
        </div>
        <div class="stat-info">
          <h3 id="total-products">0</h3>
          <p>Total Products</p>
        </div>
      </div>
    </div>

    <!-- Recent Orders Table -->
    <div class="admin-table-container">
      <h2>Recent Orders</h2>
      <table class="admin-table">
        <thead>
          <tr>
            <th>Order #</th>
            <th>Customer</th>
            <th>Total</th>
            <th>Status</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="orders-table-body">
          <tr>
            <td colspan="6" style="text-align:center; color: var(--text-mid);">Loading orders...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
